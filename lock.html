<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Lock</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    font-family: Arial, sans-serif;
    color: white;
    flex-direction: column;
}

.lock {
    font-size: 110px;
    transition: transform 0.6s ease, color 0.6s ease;
}

.unlock-animation {
    transform: rotate(-20deg) scale(1.1);
    color: #00ff88;
}

.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-8px); }
    100% { transform: translateX(0); }
}

.inputs {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

input {
    width: 65px;
    height: 65px;
    font-size: 30px;
    text-align: center;
    border-radius: 12px;
    border: none;
    background: #222;
    color: white;
    outline: none;
    transition: 0.2s;
}

input:focus {
    background: #333;
    transform: scale(1.1);
}

button {
    margin-top: 25px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #00ff88;
    color: black;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.audio-container {
    margin-top: 30px;
    display: none;
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="lockIcon" class="lock">🔒</div>

<div class="inputs">
    <input type="text" maxlength="1" id="l1">
    <input type="text" maxlength="1" id="l2">
    <input type="text" maxlength="1" id="l3">
</div>

<button onclick="checkCode()">Unlock</button>

<div class="audio-container" id="audioBox">
    <audio id="audio" controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
const inputs = document.querySelectorAll("input");

// Auto move to next input
inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.toUpperCase();
        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });
});

function checkCode() {
    const code = 
        document.getElementById("l1").value +
        document.getElementById("l2").value +
        document.getElementById("l3").value;

    const lock = document.getElementById("lockIcon");

    if (code.toUpperCase() === "LEO") {
        lock.textContent = "🔓";
        lock.classList.add("unlock-animation");
        document.getElementById("audioBox").style.display = "block";
        document.getElementById("audio").play();
    } else {
        lock.classList.add("shake");
        setTimeout(() => lock.classList.remove("shake"), 400);
    }
}
</script>

</body>
</html>
